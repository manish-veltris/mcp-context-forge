apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: contextforge-operator
rules:
  # ContextForge CRD
  - apiGroups: ["contextforge.io"]
    resources: ["contextforges"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["contextforge.io"]
    resources: ["contextforges/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["contextforge.io"]
    resources: ["contextforges/finalizers"]
    verbs: ["update"]
  # Core resources
  - apiGroups: [""]
    resources: ["services", "configmaps", "secrets", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Workloads
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Jobs (migrations)
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # OpenShift Routes
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
