          memory: 1Gi
          cpu: 500m
      runPolicy: Serial

  # ─────────────────────────────────────────────────────────────────────────
  # benchmark-server (Go)
  # Context: mcp-servers/go/benchmark-server   Dockerfile: Dockerfile
  # ─────────────────────────────────────────────────────────────────────────
