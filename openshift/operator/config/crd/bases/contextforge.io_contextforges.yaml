apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: contextforges.contextforge.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.0
spec:
  group: contextforge.io
  names:
    kind: ContextForge
    listKind: ContextForgeList
    plural: contextforges
    singular: contextforge
    shortNames:
      - cf
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Gateway
          type: boolean
          jsonPath: .status.gatewayReady
        - name: Database
          type: boolean
          jsonPath: .status.databaseReady
        - name: Redis
          type: boolean
          jsonPath: .status.redisReady
        - name: Endpoint
          type: string
          jsonPath: .status.gatewayEndpoint
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          description: ContextForge deploys and manages a complete ContextForge MCP gateway cluster.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required: [gateway, database, redis, auth]
              properties:
                gateway:
                  type: object
                  properties:
                    image:
                      type: string
                      description: Container image for the gateway. Defaults to contextforge:latest ImageStream.
                    replicas:
                      type: integer
                      format: int32
                      minimum: 1
                      default: 1
                    httpServer:
                      type: string
                      enum: [gunicorn, granian]
                      default: gunicorn
                    workers:
                      type: integer
                      format: int32
                      minimum: 1
                    resources:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    sessionPoolEnabled:
                      type: boolean
                      default: true
                      description: Enables MCP session pooling.
                    streamableHTTPMaxEventsPerStream:
                      type: integer
                      format: int32
                      minimum: 1
                      description: Maximum events per streamable HTTP stream.
                    httpxMaxConnections:
                      type: integer
                      format: int32
                      minimum: 1
                      description: Maximum number of HTTPX client connections.
                    httpxMaxKeepaliveConnections:
                      type: integer
                      format: int32
                      minimum: 1
                      description: Maximum number of HTTPX keepalive connections.
                    env:
                      type: array
                      items:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                    route:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                          default: true
                        host:
                          type: string
                        tlsTermination:
                          type: string
                          enum: [edge, passthrough, reencrypt]
                          default: edge
                database:
                  type: object
                  description: "Exactly one of managed or external must be set."
                  properties:
                    managed:
                      type: object
                      properties:
                        image:
                          type: string
                          default: "postgres:18"
                        storageSize:
                          type: string
                          default: "5Gi"
                        storageClassName:
                          type: string
                        resources:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                    external:
                      type: object
                      properties:
                        url:
                          type: string
                        secretRef:
                          type: object
                          properties:
                            name:
                              type: string
                redis:
                  type: object
                  description: "Exactly one of managed or external must be set."
                  properties:
                    managed:
                      type: object
                      properties:
                        image:
                          type: string
                          default: "redis:latest"
                        resources:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                    external:
                      type: object
                      properties:
                        url:
                          type: string
                        secretRef:
                          type: object
                          properties:
                            name:
                              type: string
                nginx:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: true
                    image:
                      type: string
                    resources:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                auth:
                  type: object
                  properties:
                    jwtSecretRef:
                      type: object
                      properties:
                        name:
                          type: string
                    adminEmail:
                      type: string
                      default: "admin@example.com"
                    adminPasswordRef:
                      type: object
                      properties:
                        name:
                          type: string
                features:
                  type: object
                  properties:
                    ui:
                      type: boolean
                      default: true
                    adminApi:
                      type: boolean
                      default: true
                    a2a:
                      type: boolean
                      default: true
                    plugins:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                          default: false
                          description: Toggles the plugin framework on or off.
                        configFile:
                          type: string
                          description: Path to the plugins configuration YAML inside the container.
                        configMapRef:
                          type: object
                          description: "ConfigMap with key 'config.yaml' mounted as the plugins config. Overrides config.yaml from gitSource."
                          properties:
                            name:
                              type: string
                        canOverrideAuthHeaders:
                          type: boolean
                          description: Allows plugins to override authentication headers.
                        gitSource:
                          type: object
                          description: Clone a git repo into an emptyDir as the plugins directory. The operator resolves the ref to a commit SHA and triggers rolling restarts on changes.
                          required: [url]
                          properties:
                            url:
                              type: string
                              description: HTTPS clone URL of the git repository.
                            ref:
                              type: string
                              default: main
                              description: Branch, tag, or commit to checkout.
                            directory:
                              type: string
                              description: Subdirectory within the repo to use as plugins root.
                            secretRef:
                              type: object
                              description: "Secret with git credentials. Keys: 'token' (Bearer) or 'username'+'password' (Basic)."
                              properties:
                                name:
                                  type: string
                        volumeMounts:
                          type: array
                          description: Additional volume mounts for plugin directories.
                          items:
                            type: object
                            x-kubernetes-preserve-unknown-fields: true
                        volumes:
                          type: array
                          description: Additional volumes for plugin data.
                          items:
                            type: object
                            x-kubernetes-preserve-unknown-fields: true
                    catalog:
                      type: boolean
                      default: true
                    rustRuntime:
                      type: object
                      properties:
                        mode:
                          type: string
                          enum: ["off", "shadow", "edge", "full"]
                          default: "off"
                        logPath:
                          type: string
                          description: File path for Rust runtime logs inside the container.
                testing:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    fastTimeServer:
                      type: boolean
                    fastTestServer:
                      type: boolean
                    slowTimeServer:
                      type: boolean
                    a2aEchoAgent:
                      type: boolean
                    locust:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                          description: Deploys Locust load testing pods.
                        locustfile:
                          type: string
                          description: Name of the locustfile to use.
                        env:
                          type: array
                          description: Additional environment variables for Locust pods.
                          items:
                            type: object
                            x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                phase:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      observedGeneration:
                        type: integer
                        format: int64
                    required: [type, status]
                gatewayReady:
                  type: boolean
                databaseReady:
                  type: boolean
                redisReady:
                  type: boolean
                migrationComplete:
                  type: boolean
                gatewayEndpoint:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
