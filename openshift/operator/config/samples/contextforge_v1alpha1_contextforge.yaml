apiVersion: contextforge.io/v1alpha1
kind: ContextForge
metadata:
  name: contextforge-dev
spec:
  gateway:
    # Uses the contextforge:latest ImageStream from the build pipelines
    image: image-registry.openshift-image-registry.svc:5000/contextforge-dev/contextforge:latest
    replicas: 1
    httpServer: gunicorn
    workers: 4
    sessionPoolEnabled: true
    httpxMaxConnections: 500
    httpxMaxKeepaliveConnections: 300
    route:
      enabled: true
      tlsTermination: edge

  database:
    managed:
      image: postgres:18
      storageSize: "5Gi"

  redis:
    managed:
      image: redis:latest

  nginx:
    enabled: true
    image: image-registry.openshift-image-registry.svc:5000/contextforge-dev/nginx-cache:latest

  auth:
    adminEmail: admin@example.com

  features:
    ui: true
    adminApi: true
    a2a: true
    plugins:
      enabled: true
      canOverrideAuthHeaders: true
      # Clone plugins from a git repo; operator polls for new commits
      # and triggers a rolling restart when the ref advances.
      gitSource:
        url: https://github.com/org/my-plugins.git
        ref: main
        directory: wxo-plugins
        # secretRef:
        #   name: git-credentials  # Secret with key "token" for private repos
    catalog: true
    rustRuntime:
      mode: "off"
